<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- WebGPU shim for Firefox compatibility -->
    <script>
      // Prevent Three.js WebGPU error in Firefox
      if (typeof window !== 'undefined' && typeof GPUShaderStage === 'undefined') {
        window.GPUShaderStage = { VERTEX: 1, FRAGMENT: 2, COMPUTE: 4 };
        window.GPUBufferUsage = { MAP_READ: 1, MAP_WRITE: 2, COPY_SRC: 4, COPY_DST: 8, INDEX: 16, VERTEX: 32, UNIFORM: 64, STORAGE: 128, INDIRECT: 256, QUERY_RESOLVE: 512 };
        window.GPUTextureUsage = { COPY_SRC: 1, COPY_DST: 2, TEXTURE_BINDING: 4, STORAGE_BINDING: 8, RENDER_ATTACHMENT: 16 };
      }
    </script>

    <!-- Primary Meta Tags -->
    <title>Feraj Solar Limited - Leading Solar Energy Solutions in Kenya</title>
    <meta
      name="title"
      content="Feraj Solar Limited - Leading Solar Energy Solutions in Kenya"
    />
    <meta
      name="description"
      content="Kenya's premier solar energy provider. Quality solar panels, inverters, batteries and complete solar solutions. Sustainable, reliable, affordable green energy."
    />
    <meta
      name="keywords"
      content="solar energy Kenya, solar panels, solar inverters, renewable energy, Feraj Solar, green energy, solar installation"
    />
    <meta name="author" content="Feraj Solar Limited" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://feraj-solar.netlify.app/" />
    <meta
      property="og:title"
      content="Feraj Solar Limited - Leading Solar Energy Solutions"
    />
    <meta
      property="og:description"
      content="Kenya's premier solar energy provider offering quality solar solutions for homes and businesses."
    />
    <meta property="og:image" content="/images/logos/feraj-solar-logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://feraj-solar.netlify.app/" />
    <meta
      property="twitter:title"
      content="Feraj Solar Limited - Leading Solar Energy Solutions"
    />
    <meta
      property="twitter:description"
      content="Kenya's premier solar energy provider offering quality solar solutions for homes and businesses."
    />
    <meta
      property="twitter:image"
      content="/images/logos/feraj-solar-logo.png"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/images/logos/feraj-solar-logo.png"
    />
    <link rel="apple-touch-icon" href="/images/logos/feraj-solar-logo.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#16a34a" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
